<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UDMap - Student Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #011a10; font-family: 'Nunito', sans-serif;
      color: white; overflow: hidden;
    }

    /* Background Glows */
    .bg-glow {
      position: absolute; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(82, 255, 0, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(182, 255, 146, 0.2);
      border-radius: 30px;
      padding: 40px;
      width: 100%; max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      z-index: 10;
    }

    .card-header h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem; letter-spacing: 2px;
      color: #b6ff92; margin-bottom: 10px;
    }

    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; color: rgba(255,255,255,0.6); font-weight: 700; }
    
    .input-group input {
      width: 100%; padding: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; color: white;
      font-size: 1rem; outline: none; transition: 0.3s;
    }
    .input-group input:focus { border-color: #b6ff92; background: rgba(255,255,255,0.1); }

    .btn-submit {
      width: 100%; padding: 15px;
      background: linear-gradient(90deg, #014d31, #013220);
      color: white; border: 1px solid #b6ff92;
      border-radius: 50px; font-weight: 900;
      text-transform: uppercase; cursor: pointer;
      transition: 0.3s; margin-top: 10px;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(82, 255, 0, 0.3); }

    .back-link { margin-top: 20px; display: block; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 14px; }
    .back-link:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="login-card">
    <div class="card-header">
      <h2>Student Portal</h2>
      <p style="font-size: 14px; opacity: 0.7;">Enter your credentials to continue the quest.</p>
    </div>

    <form action="login.php" method="POST">
      <div class="input-group">
        <label>Student ID or Email</label>
        <input type="text" name="identifier" placeholder="e.g. 2024-10001" required>
      </div>

      <div class="input-group">
        <label>Passcode</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-submit">Unlock Access</button>
    </form>

    <a href="home.html" class="back-link">← Return to Forest</a>
  </div>
</body>
</html>
