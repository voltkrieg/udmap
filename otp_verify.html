<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UDMap - Guardian Verification</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #011a10; font-family: 'Nunito', sans-serif; color: white; overflow: hidden; }
    .bg-glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(182, 255, 146, 0.05) 0%, transparent 70%); pointer-events: none; }
    .login-card { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(182, 255, 146, 0.2); border-radius: 30px; padding: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 10; }
    .card-header h2 { font-family: 'Cinzel', serif; font-size: 1.8rem; color: #b6ff92; margin-bottom: 10px; }
    .otp-inputs { display: flex; gap: 10px; justify-content: center; margin: 25px 0; }
    .otp-inputs input { width: 50px; height: 60px; text-align: center; font-size: 24px; font-weight: 900; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #b6ff92; outline: none; transition: 0.3s; }
    .otp-inputs input:focus { border-color: #b6ff92; background: rgba(255,255,255,0.1); box-shadow: 0 0 10px rgba(182, 255, 146, 0.2); }
    .btn-verify { width: 100%; padding: 15px; background: linear-gradient(90deg, #014d31, #013220); color: white; border: 1px solid #b6ff92; border-radius: 50px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
    .btn-verify:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(82, 255, 0, 0.3); }
    .resend-link { margin-top: 20px; display: block; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 14px; cursor: pointer; }
    .resend-link:hover { color: #b6ff92; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="login-card">
    <div class="card-header">
      <h2>Verify Identity</h2>
      <p style="font-size: 13px; opacity: 0.7;">A 6-digit code was sent to your email.</p>
    </div>

    <div class="otp-inputs" id="otp-container">
      <input type="text" maxlength="1" autofocus>
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
    </div>

    <button type="button" class="btn-verify" onclick="verifyOTP()">Verify Code</button>
    <div class="resend-link" onclick="resendOTP()">Didn't receive it? Resend Code</div>
  </div>

  <script src="otp_controller.js"></script>
</body>
</html>
